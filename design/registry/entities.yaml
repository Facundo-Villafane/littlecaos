# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: costo_efectivo
    status: active
    source: design/gdd/card-system.md
    referenced_by:
      - design/gdd/card-system.md
      - design/gdd/situation-system.md
      - design/gdd/status-effect-system.md
    variables:
      - costo_base
      - mod_situacion
      - mod_estado
    output_range: [0, 99]
    expression: "max(0, costo_base + sum(mod_situacion) + sum(mod_estado))"
    notes: "Output mínimo es 0 (max() previene costos negativos). Output máximo teórico es sin límite si los modificadores son muy positivos; en la práctica rara vez supera 6."
    added: 2026-05-17
    revised: ""

  - name: diario_hp_recovery
    status: active
    source: design/gdd/relic-system.md
    referenced_by:
      - design/gdd/relic-system.md
    variables:
      - stack_delta
      - DIARIO_HP_PER_STACK
    output_range: [2, 6]
    expression: "stack_delta × DIARIO_HP_PER_STACK"
    notes: "stack_delta = stacks negativos recibidos en un único evento on_status_applied (1–3). DIARIO_HP_PER_STACK = 2. Output capeado por HP_BASE=60 del Player Character System."
    added: 2026-05-19
    revised: ""

  - name: amuleto_mana_bonus
    status: active
    source: design/gdd/relic-system.md
    referenced_by:
      - design/gdd/relic-system.md
    variables:
      - unplayed_cards
      - AMULETO_MANA_PER_CARD
      - AMULETO_MAX_BONUS
    output_range: [0, 3]
    expression: "min(unplayed_cards × AMULETO_MANA_PER_CARD, AMULETO_MAX_BONUS)"
    notes: "unplayed_cards = cartas descartadas al fin de turno sin ser jugadas (0–4). AMULETO_MANA_PER_CARD=1, AMULETO_MAX_BONUS=3. Cap evaluado por evento, no al final del turno."
    added: 2026-05-19
    revised: ""

  - name: offer_generation
    status: active
    source: design/gdd/deck-building-system.md
    referenced_by:
      - design/gdd/deck-building-system.md
    variables:
      - eligible_pool
      - OFFER_SIZE
      - copies_in_deck
      - DUPLICATE_CAP
    output_range: [0, 3]
    expression: "sample_without_replacement(eligible_pool, OFFER_SIZE) where eligible_pool = { c ∈ card_pool | copies_in_deck(c) < DUPLICATE_CAP }"
    notes: "output is 0–3 distinct cards. 0 means pool exhausted (add option blocked). With MVP values (pool=20, DECK_CAP=20, DUPLICATE_CAP=2), output < 3 while available_add=true is mathematically impossible."
    added: 2026-05-20
    revised: ""

  - name: duplicate_cap_check
    status: active
    source: design/gdd/deck-building-system.md
    referenced_by:
      - design/gdd/deck-building-system.md
    variables:
      - copies_in_deck
      - DUPLICATE_CAP
    output_range: [0, 1]
    expression: "excluded_from_offer(c) = copies_in_deck(c) >= DUPLICATE_CAP"
    notes: "Boolean output. copies_in_deck() MUST compare by card_id (String), not object reference. Used during eligible_pool construction in offer_generation."
    added: 2026-05-20
    revised: ""

  - name: deck_size_after
    status: active
    source: design/gdd/deck-building-system.md
    referenced_by:
      - design/gdd/deck-building-system.md
    variables:
      - deck_size
      - action
    output_range: [4, 20]
    expression: "deck_size + Δ(action) where Δ: add_card=+1, upgrade_card=0, remove_card=-1, add_relic=0"
    notes: "Output guaranteed in [4,20] if availability checks (Fórmula 2) are respected before allowing the action. upgrade_card and add_relic are deck-size neutral."
    added: 2026-05-20
    revised: ""

  - name: gold_accumulated
    status: active
    source: design/gdd/node-map-system.md
    referenced_by:
      - design/gdd/node-map-system.md
    variables:
      - gold_drop_easy
      - gold_drop_medium
      - gold_drop_hard
      - combat_nodes_visited
    output_range: [0, 102]
    expression: "Σ(gold_drop(enemy_tier_n)) for each COMBAT node visited"
    notes: "Max in MVP: 20+32+50=102 (Easy row1 + Medium row2 + Hard row4). Min before first Market: 20 (only row1 before row2 Market). gold does not reset between runs."
    added: 2026-05-21
    revised: ""

  - name: can_purchase_market_item
    status: active
    source: design/gdd/node-map-system.md
    referenced_by:
      - design/gdd/node-map-system.md
    variables:
      - player_gold
      - item_price
      - purchase_preconditions
    output_range: [0, 1]
    expression: "(player_gold >= item.price) AND purchase_preconditions(item)"
    notes: "Boolean output. Preconditions: HP items require hp < HP_MAX; cards require deck_size < DECK_CAP AND copies < DUPLICATE_CAP; relics require pool available."
    added: 2026-05-21
    revised: ""

